[advisories]
unmaintained = "workspace"
yanked = "warn"
ignore = []

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "OpenSSL",
    "GPL-3.0",
    "GPL-3.0-only",
    "AGPL-3.0-only",
    "BSL-1.0",
    "CC0-1.0",
    "OFL-1.1",
    "MPL-2.0",
]
exceptions = [
    { allow = ["Unicode-3.0", "Ubuntu-font-1.0"], crate = "epaint_default_fonts" },
]

[bans]
multiple-versions = "warn"
wildcards = "allow"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
